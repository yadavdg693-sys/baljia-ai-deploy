# Cloudflare Workers config for Baljia platform (spike)
# Ported from render.yaml equivalent. Covers Workers + Cron Triggers.
# Workflows v2 binding added separately when worker-launcher is ported.

name = "baljia-cf-spike"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Entry wraps OpenNext output (.open-next/worker.js) and adds a scheduled()
# handler so [triggers.crons] below actually fire. See src/cf-worker-entry.ts
# for the cron->route dispatch table — KEEP THE TWO IN SYNC.
# Build order: `opennextjs-cloudflare build` produces .open-next/, then
# `wrangler deploy` bundles this TS entry which re-imports worker.js.
main = "src/cf-worker-entry.ts"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ─────────────────────────────────────────────────────────────
# Cron Triggers — direct port of 6 Render cron jobs.
# Cloudflare invokes the Worker's scheduled() handler at each time.
# The handler dispatches to the matching /api/cron/* route via internal fetch.
# ─────────────────────────────────────────────────────────────
[triggers]
crons = [
  "0 2 * * *",       # baljia-night-shift      — daily 2am UTC
  "0 */6 * * *",     # baljia-recurring        — every 6 hours
  "0 3 * * *",       # baljia-trial-expiry     — daily 3am UTC
  "*/15 * * * *",    # baljia-platform-ops     — every 15 min (existing health/regression checks)
  "0 4 * * *",       # baljia-credit-renewal   — daily 4am UTC
  "*/5 * * * *",     # baljia-onboarding-cleanup — every 5 min
  "* * * * *",       # baljia-queue-tick       — every 1 min (CF replacement for Render's worker-boot poller)
  "*/3 * * * *",     # baljia-lease-reclaim    — every 3 min (Render had */5; */5 slot is taken by onboarding-cleanup so we picked */3 — adjacent cadence, defensive lease cleanup runs slightly more often)
  "5 * * * *",       # baljia-platform-ops-triage — hourly at :05 (offset from queue-tick); reads open bugs from platform_feedback, runs triage agent on each. Honors PLATFORM_OPS_PAUSED env var.
  "20 * * * *",      # baljia-platform-ops-fix    — hourly at :20 (15 min after triage); writer agent fixes approved bugs + opens PRs; verifier agent reviews open PRs. Honors PLATFORM_OPS_WRITE_DISABLED.
]

