services:
  - type: web
    name: baljia-ai
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_REASONING_EFFORT
        value: xhigh
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_APP_DOMAIN
        value: baljia.app
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: NEON_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_ORG
        value: BALAJIapps
      - key: ENCRYPTION_KEY
        sync: false
      - key: BROWSERBASE_API_KEY
        sync: false
      - key: BROWSERBASE_PROJECT_ID
        sync: false
      - key: IPINFO_TOKEN
        sync: false
      - key: LATEDEV_API_KEY
        sync: false
      - key: META_ADS_ACCESS_TOKEN
        sync: false
      - key: META_ADS_ACCOUNT_ID
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: META_PIXEL_ID
        sync: false
      - key: META_CAPI_ACCESS_TOKEN
        sync: false
      - key: HEYGEN_API_KEY
        sync: false
      - key: HEYGEN_FOUNDER_VOICE_ID
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: BALJIA_AUTH_FROM_EMAIL
        value: system@baljia.ai

  # ── Durable Task Worker ──
  # ARCHITECTURE_AUDIT A2/B1 fix: long-running agent tasks are no longer fired
  # as fire-and-forget promises from the web service. This worker polls the
  # tasks table, claims via atomic UPDATE with a 5-minute lease, heartbeats
  # every 60s, and runs launchTask(). If this worker crashes, the lease
  # expires and another worker (or this one after restart) reclaims the task.
  # Credit debit is idempotent on execution_id so reclaim never double-charges.
  - type: worker
    name: baljia-ai-worker
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && (python -m pip install --user graphifyy==0.7.16 || python3 -m pip install --user graphifyy==0.7.16)
    startCommand: npx tsx scripts/worker-boot.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AWS_BEDROCK_API_KEY
        sync: false
      - key: AWS_BEDROCK_REGION
        value: us-east-1
      - key: MOONSHOT_API_KEY
        sync: false
      - key: MOONSHOT_API_BASE
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_REASONING_EFFORT
        value: xhigh
      - key: BALJIA_OPENAI_OAUTH_STORE_PATH
        sync: false
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: TAVILY_API_KEYS
        sync: false
      - key: NEON_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_ORG
        value: BALAJIapps
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_ZONE_ID_APP
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: META_ADS_ACCESS_TOKEN
        sync: false
      - key: META_ADS_ACCOUNT_ID
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: META_PIXEL_ID
        sync: false
      - key: META_CAPI_ACCESS_TOKEN
        sync: false
      - key: HEYGEN_API_KEY
        sync: false
      - key: HEYGEN_FOUNDER_VOICE_ID
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: BROWSERBASE_API_KEY
        sync: false
      - key: BROWSERBASE_PROJECT_ID
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GRAPHIFY_ENABLED
        value: "true"

  # ── Cron: Night Shift ──
  # Runs for ALL active companies every night at 2am UTC.
  # Executes todo tasks, retries failures, probes deployed URLs for health.
  - type: cron
    name: baljia-night-shift
    runtime: node
    region: oregon
    schedule: "0 2 * * *"
    buildCommand: ""
    startCommand: >
      curl -s -o /dev/null -w "%{http_code}" -X POST
      "$NEXT_PUBLIC_APP_URL/api/cron/night-shift"
      -H "x-cron-secret: $CRON_SECRET"
      -H "Content-Type: application/json"
    envVars:
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # ── Cron: Recurring Tasks ──
  # Materialises daily/weekly/monthly recurring task instances every 6 hours.
  - type: cron
    name: baljia-recurring
    runtime: node
    region: oregon
    schedule: "0 */6 * * *"
    buildCommand: ""
    startCommand: >
      curl -s -o /dev/null -w "%{http_code}" -X POST
      "$NEXT_PUBLIC_APP_URL/api/cron/recurring"
      -H "x-cron-secret: $CRON_SECRET"
      -H "Content-Type: application/json"
    envVars:
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # ── Cron: Trial Expiry ──
  # Suspends expired trials and past-due subscriptions every day at 3am UTC.
  - type: cron
    name: baljia-trial-expiry
    runtime: node
    region: oregon
    schedule: "0 3 * * *"
    buildCommand: ""
    startCommand: >
      curl -s -o /dev/null -w "%{http_code}"
      "$NEXT_PUBLIC_APP_URL/api/cron/trial-expiry"
      -H "x-cron-secret: $CRON_SECRET"
    envVars:
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # ── Cron: Platform Ops ──
  # Runs infra health checks every 15 min. Billing audit runs daily at 05:00 UTC.
  # SPEC-OPS-001: regression guard, known issue registry, infra watchdog, billing auditor.
  - type: cron
    name: baljia-platform-ops
    runtime: node
    region: oregon
    schedule: "*/15 * * * *"
    buildCommand: ""
    startCommand: >
      curl -s -o /dev/null -w "%{http_code}"
      "$NEXT_PUBLIC_APP_URL/api/cron/platform-ops"
      -H "x-cron-secret: $CRON_SECRET"
    envVars:
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # ── Cron: Credit Renewal Safety Net ──
  # Catches any companies that should have had credits renewed but didn't
  # (e.g. missed Stripe webhook). Runs daily at 4am UTC.
  - type: cron
    name: baljia-credit-renewal
    runtime: node
    region: oregon
    schedule: "0 4 * * *"
    buildCommand: ""
    startCommand: >
      curl -s -o /dev/null -w "%{http_code}" -X POST
      "$NEXT_PUBLIC_APP_URL/api/cron/credit-renewal"
      -H "x-cron-secret: $CRON_SECRET"
      -H "Content-Type: application/json"
    envVars:
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # ── Cron: Lease Reclaim ──
  # Defensive cleanup for durable-execution leases. The worker's own claim query
  # already reclaims expired leases when it polls; this cron catches the case
  # where no workers are polling (worker service down) and also marks tasks
  # failed_permanent when attempt_count exceeds the cap (prevents infinite reclaim).
  - type: cron
    name: baljia-lease-reclaim
    runtime: node
    region: oregon
    schedule: "*/5 * * * *"
    buildCommand: ""
    startCommand: >
      curl -s -o /dev/null -w "%{http_code}" -X POST
      "$NEXT_PUBLIC_APP_URL/api/cron/lease-reclaim"
      -H "x-cron-secret: $CRON_SECRET"
      -H "Content-Type: application/json"
    envVars:
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # ── Cron: Onboarding Cleanup ──
  # Sweeps stuck onboarding_status='running' rows older than 10min, marks them
  # 'failed'. Complements the in-process watchdog (covers the case where a
  # process was killed before watchdog.stop() could reset state). Runs every 5 min.
  - type: cron
    name: baljia-onboarding-cleanup
    runtime: node
    region: oregon
    schedule: "*/5 * * * *"
    buildCommand: ""
    startCommand: >
      curl -s -o /dev/null -w "%{http_code}" -X POST
      "$NEXT_PUBLIC_APP_URL/api/cron/onboarding-cleanup"
      -H "x-cron-secret: $CRON_SECRET"
      -H "Content-Type: application/json"
    envVars:
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false

