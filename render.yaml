# ── Baljia — TESTING CONFIGURATION ──
# Free tier web service only. NO CRON JOBS (free tier doesn't support them).
# Use this to validate deploy + DNS + public URLs without cost.
#
# BEFORE LAUNCH: swap to the production version in render.prod.yaml:
#   cp render.prod.yaml render.yaml && git commit -am "Swap to production render config" && git push
# That re-enables 6 cron jobs + starter plan ($13/mo).
#
# Free tier trade-offs during testing:
# - Service sleeps after 15 min of inactivity → 30-60s cold start on wake
# - No cron jobs → night shifts, trial expiry, onboarding cleanup all skipped
# - 750 hrs/month included (≈ always-on one service for a month)

services:
  - type: web
    name: baljia-ai
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_APP_DOMAIN
        value: baljia.app
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: NEON_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_ORG
        value: BALAJIapps
      - key: ENCRYPTION_KEY
        sync: false
      - key: BROWSERBASE_API_KEY
        sync: false
      - key: BROWSERBASE_PROJECT_ID
        sync: false
      - key: IPINFO_TOKEN
        sync: false
      - key: LATEDEV_API_KEY
        sync: false
      - key: BALJIA_AUTH_FROM_EMAIL
        value: system@baljia.ai
